<div class="tv-dashboard">
  
  <main class="main-zone">
    <div class="top-info">
      <div class="clock-box">
        <span class="date">{{ fechaActual }}</span>
        <span class="time">{{ horaActual }}</span>
      </div>
    </div>

    <div class="video-wrapper">
      <video id="video" autoplay muted loop style="width:100%; height: 100%; object-fit: cover;"></video>
      <div class="video-overlay"></div> 
    </div>

    <div class="ticker-bar pulse-active">
      <div class="ticker-badge">
        <span class="dot-indicator"></span> ATENDIENDO AHORA
      </div> 
      <div class="ticker-info" *ngIf="turnoActual$ | async as actual">
        <span class="turn-number">#{{actual.numero_turno}}</span>
        <span class="turn-name">{{actual.nombre_cliente}}</span>
      </div>
    </div>
  </main>

  <aside class="sidebar-zone">
    <div class="sidebar-header">
      <h2>EN ESPERA</h2>
      <div class="line-deco"></div>
    </div>

    <div class="queue-list">
      <div class="queue-item" *ngFor="let t of siguientes$ | async">
        <div class="queue-number">#{{t.numero_turno}}</div>
        <div class="queue-name">{{t.nombre_cliente}}</div>
      </div>
    </div>

    <div class="qr-section">
      <div class="qr-card">
        <p class="qr-title">ESCANEA TU TURNO</p>
        <div class="qr-frame">
          <qrcode [qrdata]="enlaceRegistro" [width]="150" [colorDark]="'#000000'"></qrcode>
        </div>
      </div>
    </div>
  </aside>

</div>
